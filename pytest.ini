[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --alluredir=reports/allure-results
    --clean-alluredir
    --junit-xml=reports/junit.xml
    --maxfail=3

markers =
    e2e: full end-to-end purchase flow scenario
    smoke: fast sanity checks
    search: tests targeting the search/price-filter flow
    cart: tests targeting cart and total assertions
    data_driven: tests parameterized from data/*.yaml

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

log_file = reports/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
