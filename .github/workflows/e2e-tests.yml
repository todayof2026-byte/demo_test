name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
      SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
      HEADED: "false"
      FORCE_FRESH_LOGIN: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run login test
        run: python -m pytest tests/test_login.py -v --tb=short

      - name: Run E2E + data-driven tests
        run: python -m pytest tests/test_e2e_purchase_flow.py tests/test_search_data_driven.py -v --tb=short

      - name: Build Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate reports/allure-results -o reports/allure-html --clean

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/allure-html/
            reports/allure-results/
            reports/evidence/
            reports/junit.xml
            reports/pytest.log
          retention-days: 30
