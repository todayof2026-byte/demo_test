name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
      SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
      HEADED: "false"
      FORCE_FRESH_LOGIN: "true"
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Cache npm (for Allure CLI)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-allure-${{ runner.os }}
          restore-keys: |
            npm-allure-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run login test
        run: python -m pytest tests/test_login.py -v --tb=short

      - name: Run E2E + data-driven tests
        run: python -m pytest tests/test_e2e_purchase_flow.py tests/test_search_data_driven.py -v --tb=short

      - name: Build Allure HTML report
        if: always()
        run: allure generate reports/allure-results -o reports/allure-html --clean

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-html/
          retention-days: 30

      - name: Upload Screenshots & Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-evidence
          path: reports/evidence/
          retention-days: 30

      - name: Upload Raw Results (JUnit, logs, Allure JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-results
          path: |
            reports/allure-results/
            reports/junit.xml
            reports/pytest.log
          retention-days: 30

      - name: Add summary with artifact links
        if: always()
        run: |
          echo "## 📊 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **allure-report** | Interactive HTML report (download, extract, open index.html with \`npx serve\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **test-evidence** | Screenshots, videos, traces per test |" >> $GITHUB_STEP_SUMMARY
          echo "| **raw-results** | JUnit XML, pytest logs, Allure JSON |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to view the Allure report locally:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Download and extract allure-report.zip, then:" >> $GITHUB_STEP_SUMMARY
          echo "npx serve allure-report" >> $GITHUB_STEP_SUMMARY
          echo "# Or if you have allure CLI:" >> $GITHUB_STEP_SUMMARY
          echo "allure open allure-report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
