# ----------------------------------------------------------------------------
# Data-driven scenarios for tests/test_search_data_driven.py
#
# Target site: automationexercise.com (currency: Rs. / INR).
#
# The site has NO UI price filter and NO pagination on search results, so we
# can't exercise the paginator branch here - instead the scenarios cover:
#   - full_results : a query that returns enough items above and below the
#                    threshold; exercises client-side price filtering.
#   - tight_budget : a tighter budget that excludes most matches; verifies
#                    the flow returns a smaller, well-filtered list.
#   - empty_ok     : a nonsense query - returning [] is valid per the brief.
# ----------------------------------------------------------------------------

scenarios:
  - id: full_results_tshirt
    description: T-shirts under Rs. 1500 - happy path with several matches.
    query: "tshirt"
    max_price: 1500
    limit: 5

  - id: tight_budget_dress
    description: Dresses under Rs. 600 - exercises tight client-side filtering.
    query: "dress"
    max_price: 600
    limit: 5

  - id: empty_ok_nonsense
    description: Nonsense query - returning zero URLs is valid per the brief.
    query: "asdfqwerty12345nope"
    max_price: 100
    limit: 5
