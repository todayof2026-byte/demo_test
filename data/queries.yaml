# ----------------------------------------------------------------------------
# Data-driven scenarios for tests/test_search_data_driven.py
#
# Each scenario exercises a different code path of
# `searchItemsByNameUnderPrice`:
#   - full_results: enough hits on the first page; no pagination needed
#   - with_pagination: not enough hits on page 1, must follow Next
#   - empty_ok: query yields nothing - returning [] is valid per the brief
# ----------------------------------------------------------------------------

scenarios:
  - id: full_results_running_shoes
    description: Plenty of running shoes under $220 on page 1 - exercises happy path.
    query: "running shoes"
    max_price: 220
    limit: 5

  - id: with_pagination_jacket
    description: Broad query with many pages - exercises paginator.go_next branch.
    query: "jacket"
    max_price: 100
    limit: 5

  - id: empty_ok_nonsense
    description: Nonsense query - returning zero URLs is valid per the brief.
    query: "asdfqwerty12345nope"
    max_price: 100
    limit: 5
